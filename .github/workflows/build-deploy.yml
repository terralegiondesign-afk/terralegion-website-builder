      #   with:
      #     host: ${{ secrets.CRM_HOST }}
      #     username: ${{ secrets.CRM_USERNAME }}
      #     key: ${{ secrets.CRM_SSH_KEY }}
      #     source: "../crm.terralegion.com/assets/website-builder/app.js,../crm.terralegion.com/assets/website-builder/styles.css"
